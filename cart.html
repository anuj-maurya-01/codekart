<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - CodeKart</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
</head>
<body>
  <!-- Header -->
    <div class="header-main">
      <div class="container">
        <a href="index.html" class="logo">
          <span>&#128187;</span> Code<span>Kart</span>
        </a>
        
        <button class="mobile-menu-btn">&#9776;</button>
        
        <form class="search-bar" id="search-form">
          <input type="text" id="header-search" placeholder="Search projects...">
          <button type="submit">&#128269;</button>
        </form>
        
        <div class="header-actions">
          <a href="login.html" id="login-link">
            <span>&#128100;</span> Login
          </a>
          <div id="user-menu" style="display: none;">
            <a href="dashboard.html">
              <span>&#128100;</span> <span class="user-name">Dashboard</span>
            </a>
          </div>
          <a href="cart.html" class="cart-icon">
            <span>&#128722;</span>
            <span class="cart-badge" style="display: none;">0</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Shopping Cart</h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span>/</span>
        <span>Cart</span>
      </div>
    </div>
  </section>

  <!-- Cart Section -->
  <section class="cart-section">
    <div class="container">
      <div class="cart-grid">
        <div class="cart-items" id="cart-items">
          <!-- Cart items will be loaded dynamically -->
        </div>
        
        <div class="cart-summary">
          <h2>Order Summary</h2>
          <div class="summary-row">
            <span>Items (<span id="cart-item-count">0</span>)</span>
            <span id="cart-subtotal">₹0.00</span>
          </div>
          <div class="summary-row">
            <span>Discount</span>
            <span>-₹0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="cart-total">₹0.00</span>
          </div>
          
          <form class="coupon-form" id="coupon-form">
            <input type="text" placeholder="Coupon code">
            <button type="submit" class="btn btn-outline btn-sm">Apply</button>
          </form>
          
          <button class="btn btn-primary btn-lg" id="proceed-checkout">
            Proceed to Checkout
          </button>
          
          <div style="margin-top: 20px; text-align: center;">
            <p style="font-size: 14px; color: var(--gray);">&#128179; Secure checkout</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
       <p>&copy; 2026 CodeKart. All rights reserved. | <a href="privacy-policy.html" style="color: #ddd;">Privacy Policy</a> | <a href="terms.html" style="color: #ddd;">Terms of Service</a> | <a href="contact.html" style="color: #ddd;">Contact Us</a> | <a href="faq.html" style="color: #ddd;">FAQ</a></p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/main.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
